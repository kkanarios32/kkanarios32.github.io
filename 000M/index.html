<span class="taxon">Theorem. </span>Weak Law of Large Numbers (Dyadic) <a class="slug" href="/000M/">[000M]</a> </h1>
<div class="metadata"><ul><li class="meta-item">November 17, 2024</li></ul></div></header></summary>
    <p xmlns="http://www.w3.org/1999/xhtml">
For each \(\epsilon \), \[\operatorname *{lim}_{n\to \infty }P\left [\omega \colon \left |{\frac {1}{n}}\sum _{i=1}^{n}d_{i}(\omega )-{\frac {1}{2}}\right |\geq \epsilon \right ]=0.\]</p>
